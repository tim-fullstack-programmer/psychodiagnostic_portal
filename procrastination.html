<!DOCTYPE html>
<html lang="en">
<head>
    <title>Procrastination Level</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #D3D3D3;
            padding: 15px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 20px;
            padding: 18px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 1.3rem;
        }
        .header a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid black;
            border-radius: 10px;
            padding: 6px 14px;
            background: #90ccf7;
        }
        .progress-bar {
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 10px;
            height: 28px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            background: #A7EF67;
            height: 100%;
            transition: width 0.3s;
            border-right: 2px solid black;
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 0.85rem;
        }
        .question-block {
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .question-block p {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.4);
            border: 2px solid black;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .option:hover {
            background: rgba(255,255,255,0.7);
        }
        .option.selected {
            background: #90ccf7;
        }
        .option input {
            width: 18px;
            height: 18px;
            accent-color: #000;
        }
        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 0.95rem;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #76b5e0;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }
        .results h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .score-display {
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }
        .score-number {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .score-level {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .score-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: left;
            margin-top: 15px;
        }
        .subscales {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .subscale {
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .subscale h4 {
            margin-bottom: 8px;
        }
        .subscale .val {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .hidden { display: none !important; }
        @media (max-width: 480px) {
            .header h1 { font-size: 1rem; }
            .score-number { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Irrational Procrastination Scale</h1>
            <a href="index.html">← Home</a>
        </div>

        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            <div class="progress-text" id="progress-text">0 / 20</div>
        </div>

        <div id="quiz-section">
            <div id="questions-area"></div>
            <button class="btn" id="submit-btn" disabled onclick="calculateResults()">Get Results</button>
        </div>

        <div id="results-section" class="hidden">
            <div class="results">
                <h2>Test Results</h2>
                <div class="score-display">
                    <div>Total Score</div>
                    <div class="score-number" id="total-score">0</div>
                    <div class="score-level" id="score-level">Low procrastination level</div>
                    <div class="score-desc" id="score-desc"></div>
                </div>
                <div class="subscales">
                    <div class="subscale">
                        <h4>Irrational Expectations</h4>
                        <div class="val" id="e-score">0</div>
                    </div>
                    <div class="subscale">
                        <h4>Low Self-Esteem</h4>
                        <div class="val" id="s-score">0</div>
                    </div>
                    <div class="subscale">
                        <h4>Impatience</h4>
                        <div class="val" id="i-score">0</div>
                    </div>
                </div>
                <button class="btn" onclick="resetQuiz()" style="margin-top: 20px;">Retake Test</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, text: "I put things off because I fear I won't do them perfectly", scale: "e" },
            { id: 2, text: "I feel incompetent when I think about unfinished tasks", scale: "s" },
            { id: 3, text: "I find it hard to start tasks that require sustained effort", scale: "i" },
            { id: 4, text: "I put things off because I fear criticism from others", scale: "e" },
            { id: 5, text: "I feel like a failure when I postpone important tasks", scale: "s" },
            { id: 6, text: "I want to get results immediately, without effort", scale: "i" },
            { id: 7, text: "I put things off because I believe I should do them effortlessly", scale: "e" },
            { id: 8, text: "My self-esteem drops when I procrastinate", scale: "s" },
            { id: 9, text: "I find it hard to tolerate discomfort for a future reward", scale: "i" },
            { id: 10, text: "I put things off because I fear the result won't meet expectations", scale: "e" },
            { id: 11, text: "I feel like I'm not good enough compared to others", scale: "s" },
            { id: 12, text: "I prefer a pleasant activity now over a difficult task", scale: "i" },
            { id: 13, text: "I put things off because I believe conditions must be perfect", scale: "e" },
            { id: 14, text: "I criticize myself for procrastinating", scale: "s" },
            { id: 15, text: "I find it hard to focus on long-term goals", scale: "i" },
            { id: 16, text: "I put things off because I fear the unknown", scale: "e" },
            { id: 17, text: "I feel ashamed when I miss a deadline", scale: "s" },
            { id: 18, text: "I prefer immediate pleasure over a delayed reward", scale: "i" },
            { id: 19, text: "I put things off because I believe I should do everything myself", scale: "e" },
            { id: 20, text: "I feel helpless in the face of difficult tasks", scale: "s" }
        ];

        const options = [
            { value: 1, label: "1 — Strongly disagree" },
            { value: 2, label: "2 — Disagree" },
            { value: 3, label: "3 — Slightly disagree" },
            { value: 4, label: "4 — Neutral" },
            { value: 5, label: "5 — Slightly agree" },
            { value: 6, label: "6 — Agree" },
            { value: 7, label: "7 — Strongly agree" }
        ];

        const answers = {};

        function renderQuestions() {
            const area = document.getElementById('questions-area');
            area.innerHTML = '';
            questions.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.innerHTML = `<p>${idx + 1}. ${q.text}</p>` +
                    options.map(opt => `
                        <div class="option" onclick="selectOption(${q.id}, ${opt.value}, this)">
                            <input type="radio" name="q${q.id}" value="${opt.value}" id="q${q.id}_${opt.value}">
                            <label for="q${q.id}_${opt.value}">${opt.label}</label>
                        </div>
                    `).join('');
                area.appendChild(block);
            });
        }

        function selectOption(qid, val, rowEl) {
            answers[qid] = val;
            const block = rowEl.closest('.question-block');
            block.querySelectorAll('.option').forEach(r => r.classList.remove('selected'));
            rowEl.classList.add('selected');
            block.querySelector(`input[value="${val}"]`).checked = true;
            updateProgress();
        }

        function updateProgress() {
            const count = Object.keys(answers).length;
            const pct = (count / questions.length) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent = count + ' / ' + questions.length;
            document.getElementById('submit-btn').disabled = count !== questions.length;
        }

        function calculateResults() {
            let total = 0, e = 0, s = 0, i = 0;
            questions.forEach(q => {
                const v = answers[q.id] || 0;
                total += v;
                if (q.scale === 'e') e += v;
                if (q.scale === 's') s += v;
                if (q.scale === 'i') i += v;
            });

            let level, color, desc;
            if (total <= 40) {
                level = 'Low procrastination level';
                color = '#2d7d32';
                desc = 'You handle tasks effectively. Procrastination is not a problem. Maintain your current time management strategies.';
            } else if (total <= 80) {
                level = 'Moderate procrastination level';
                color = '#f5a623';
                desc = 'Procrastination is present but manageable. Consider working on planning, breaking tasks into parts, and using the Pomodoro technique.';
            } else if (total <= 120) {
                level = 'High procrastination level';
                color = '#e65100';
                desc = 'Procrastination significantly interferes with your life. Cognitive-behavioral therapy and addressing irrational beliefs are recommended.';
            } else {
                level = 'Very high procrastination level';
                color = '#d0021b';
                desc = 'Procrastination seriously impairs functioning. Strongly recommended to consult a therapist.';
            }

            document.getElementById('total-score').textContent = total;
            document.getElementById('score-level').textContent = level;
            document.getElementById('score-level').style.color = color;
            document.getElementById('score-desc').textContent = desc;
            document.getElementById('e-score').textContent = e;
            document.getElementById('s-score').textContent = s;
            document.getElementById('i-score').textContent = i;

            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('progress-bar').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetQuiz() {
            for (let k in answers) delete answers[k];
            renderQuestions();
            updateProgress();
            document.getElementById('quiz-section').classList.remove('hidden');
            document.getElementById('progress-bar').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderQuestions();
    </script>
</body>
</html>
